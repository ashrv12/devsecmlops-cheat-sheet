apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dual-solver
spec:
  acme:
    email: your-email@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-privkey
    solvers:
      # Solver 1: HTTP-01 using Envoy Gateway API (For non-wildcards)
      - selector:
          dnsNames:
            - "example.com"
            - "sub.example.com"
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: external-gateway
                namespace: envoy-gateway-system
                kind: Gateway

      # Solver 2: DNS-01 using acme-dns (For wildcard)
      - selector:
          dnsNames:
            - "*.yourdomain.com"
        dns01:
          acmeDNS:
            host: https://auth.acme-dns.io
            accountSecretRef:
              name: acme-dns-secret
              key: acmedns-json
