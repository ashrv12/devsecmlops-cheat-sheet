apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  namespace: envoy-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dual-solver
spec:
  gatewayClassName: cilium
  listeners:
    # Port 80 is REQUIRED for the HTTP-01 solver (example.com)
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # Listener for the Wildcard domain
    - name: https-wildcard
      protocol: HTTPS
      port: 443
      hostname: "*.yourdomain.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-cert-tls

    # Listener for the Standard domain
    - name: https-standard
      protocol: HTTPS
      port: 443
      hostname: "example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: standard-cert-tls
