bpf:
    hostLegacyRouting: true
cgroup:
    autoMount:
        enabled: false
    hostRoot: /sys/fs/cgroup
gatewayAPI:
    enabled: true
hubble:
    enabled: true
    relay:
        enabled: true
    ui:
        enabled: true
ipam:
    mode: kubernetes
k8sServiceHost: 192.168.11.19
k8sServicePort: 6443
kubeProxyReplacement: true
l2announcements:
    enabled: true
operator:
    replicas: 1
securityContext:
    capabilities:
        ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
        cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE
