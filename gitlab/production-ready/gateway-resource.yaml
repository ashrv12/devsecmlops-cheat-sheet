apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gitlab-gateway
  namespace: istio-ingress
spec:
  gatewayClassName: istio
  listeners:
  - name: https-gitlab
    hostname: "gitlab.your-domain.com"
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: gitlab-tls-cert # The Kubernetes secret containing your TLS cert
      # Istio configuration to enforce PCI-compliant TLS versions
      options:
        tls.min_protocol_version: "TLSV1_2" 
  - name: https-harbor
    hostname: "harbor.your-domain.com"
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: harbor-tls-cert
      options:
        tls.min_protocol_version: "TLSV1_2"