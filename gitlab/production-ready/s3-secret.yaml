apiVersion: v1
kind: Secret
metadata:
  name: gitlab-object-storage-secret
  namespace: default # Deploy to the same namespace as GitLab
type: Opaque
stringData:
  connection: |
    provider: AWS
    region: garage-region
    aws_access_key_id: "YOUR_GARAGE_ACCESS_KEY"
    aws_secret_access_key: "YOUR_GARAGE_SECRET_KEY"
    endpoint: "https://s3.your-garage-domain.com"
    path_style: true