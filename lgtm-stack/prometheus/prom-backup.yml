global:
  evaluation_interval: 30s
  scrape_interval: 30s
  external_labels:
    prometheus: grafana-monitoring-test/custom
    prometheus_replica: $(POD_NAME)
scrape_configs:
- job_name: jmx_exporter
  static_configs:
  - targets:
    - 192.168.10.193:9187
    - 192.168.50.146:9187
    - 192.168.50.147:9187
    - 192.168.50.148:9187
- job_name: microservices-test
  kubernetes_sd_configs:
  - role: service
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_service_annotation_prometheus_io_scrape
    action: keep
    regex: true
  - source_labels:
    - __meta_kubernetes_service_annotation_prometheus_io_port
    - __address__
    action: replace
    regex: ([^;]+);([^:]+)(?::\d+)?
    replacement: $2:$1
    target_label: __address__
  - source_labels:
    - __meta_kubernetes_service_annotation_prometheus_io_path
    target_label: __metrics_path__
- job_name: microservice-jmx-test
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_annotation_prometheus_jmx
    action: keep
    regex: true
  - source_labels:
    - __meta_kubernetes_pod_annotation_prometheus_jmx_port
    action: replace
    target_label: __address__
  - source_labels:
    - __meta_kubernetes_pod_annotation_prometheus_jmx_path
    target_label: __metrics_path__
alerting:
  alert_relabel_configs:
  - action: labeldrop
    regex: prometheus_replica
  alertmanagers:
  - path_prefix: /
    scheme: http
    kubernetes_sd_configs:
    - role: endpoints
      namespaces:
        names:
        - grafana-monitoring-test
    relabel_configs:
    - action: keep
      source_labels:
      - __meta_kubernetes_service_name
      regex: alertmanager-main
    - action: keep
      source_labels:
      - __meta_kubernetes_endpoint_port_name
      regex: web
