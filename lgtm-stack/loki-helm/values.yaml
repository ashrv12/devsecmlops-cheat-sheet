loki:
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: s3

  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage_config:
    aws:
      s3: s3://GK66990c6e8e4dab1ca8aa4fc2:c39269a867c4a3143a663e17e8c03e48ca84c817fcab106be5751775fac3757f@garage:3900/loki-logs
      region: garage
      bucketnames: loki-logs
      s3forcepathstyle: true
      insecure: true
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 48h

  storage:
    type: s3
    bucketNames:
      chunks: loki-logs
      ruler: loki-logs
      admin: loki-logs
    s3:
      # s3 URL can be used to specify the endpoint, access key, secret key, and bucket name this works well for S3 compatible storages or are hosting Loki on-premises and want to use S3 as the storage backend. Either use the s3 URL or the individual fields below (AWS endpoint, region, secret).
      s3: s3://GK66990c6e8e4dab1ca8aa4fc2:c39269a867c4a3143a663e17e8c03e48ca84c817fcab106be5751775fac3757f@garage:3900/loki-logs
      # AWS endpoint URL
      endpoint: garage:3900
      # AWS region where the S3 bucket is located
      region: garage
      # AWS secret access key
      secretAccessKey: c39269a867c4a3143a663e17e8c03e48ca84c817fcab106be5751775fac3757f
      # AWS access key ID
      accessKeyId: GK66990c6e8e4dab1ca8aa4fc2
      # AWS signature version (e.g., v2 or v4)
      signatureVersion: v4
      # Forces the path style for S3 (true/false)
      s3ForcePathStyle: true
      # Allows insecure (HTTP) connections (true/false)
      insecure: true
      # HTTP configuration settings
      http_config: {}

# Disable minio storage
minio:
  enabled: false

gateway:
  enabled: false

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  # This tells K8s to "chown" the mount to the Loki group
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsUser: 10001
  persistence:
    storageClass: dellcsi-powerstore-nfs-test
    accessModes:
      - ReadWriteOnce
    size: 10Gi

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
