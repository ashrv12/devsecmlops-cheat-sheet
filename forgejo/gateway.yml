apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    name: forgejo-gateway
    namespace: default
spec:
    gatewayClassName: envoy-gateway
    listeners:
        - name: https
          protocol: HTTPS
          port: 443
          hostname: "forgejo.mbusiness.mn"
          tls:
              mode: Terminate
              certificateRefs:
                  - name: forgejo-tls-cert # Ensure this Secret exists
          allowedRoutes:
              namespaces:
                  from: Same
        - name: ssh
          protocol: TCP
          port: 22
          # Note: TCPRoute does not support hostname matching (SNI)
          # the same way HTTP does. Port 22 will be dedicated to SSH.
          allowedRoutes:
              namespaces:
                  from: Same
