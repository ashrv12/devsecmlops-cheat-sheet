; ------------------------------------------------------------------
; 1.  Force every login flow to go through the generic /user/oauth2
; ------------------------------------------------------------------
[oauth2]
ENABLE = true

; ------------------------------------------------------------------
; 2.  Tell Forgejo which header the reverse-proxy will inject
;     (you already have this line, keep it)
; ------------------------------------------------------------------
[security]
REVERSE_PROXY_AUTHENTICATION_USER = X-WEBAUTH-USER

; ------------------------------------------------------------------
; 3.  Disable the last local-login back-doors
; ------------------------------------------------------------------
[service]
DISABLE_REGISTRATION              = true   # we register via oauth2
ENABLE_INTERNAL_SIGNIN            = false  # no uid/pwd form
ALLOW_ONLY_EXTERNAL_REGISTRATION  = true   # oauth2 auto-reg
SHOW_REGISTRATION_BUTTON          = false  # hide the button
REQUIRE_SIGNIN_VIEW               = true   # whole site private

; ------------------------------------------------------------------
; 4.  Auto-create the account on first Keycloak login
; ------------------------------------------------------------------
[oauth2_client]
ENABLE_AUTO_REGISTRATION = true