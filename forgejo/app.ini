APP_NAME = "Example: Like nobody's business"
RUN_MODE = prod
RUN_USER = forgejo

; [database]
; DB_TYPE  = postgres
; HOST     = forgejo-db:5432
; NAME     = forgejo
; USER     = forgejo
; PASSWD   = forgejo
; SSL_MODE = disable

[repository]
ROOT = /var/lib/gitea/git/repositories

; [server]
; PROTOCOL         = http
; DOMAIN           = forgejo.example.com
; ROOT_URL         = https://forgejo.example.com/
; HTTP_ADDR        = 0.0.0.0
; HTTP_PORT        = 3000
; SSH Configuration
; DISABLE_SSH      = false
; START_SSH_SERVER = true
; SSH_DOMAIN       = forgejo.example.com
; SSH_PORT         = 22
; SSH_LISTEN_ADDR  = 0.0.0.0
; SSH_LISTEN_PORT  = 2222
; Rootless path requirements
; APP_DATA_PATH    = /var/lib/gitea/data
; SSH_ROOT_PATH    = /var/lib/gitea/data/ssh

[security]
INSTALL_LOCK = true
REVERSE_PROXY_AUTHENTICATION_USER = X-WEBAUTH-USER

[service]
# Disables standard local user registration
DISABLE_REGISTRATION = true
SHOW_REGISTRATION_BUTTON = false
ENABLE_CAPTCHA       = false
REQUIRE_SIGNIN_VIEW  = true
ENABLE_INTERNAL_SIGNIN = false
ALLOW_ONLY_EXTERNAL_REGISTRATION = true

[auth]
# Completely disables the local username/password login form
DISABLE_LOCAL_AUTHENTICATION = true

[oauth2_client]
# Allows Keycloak OIDC logins to bypass DISABLE_REGISTRATION and create the user
ENABLE_AUTO_REGISTRATION = true
# Optional: Auto-link to existing accounts if the email matches
ACCOUNT_LINKING = auto

[picture]
DISABLE_GRAVATAR        = false
ENABLE_FEDERATED_AVATAR = true

[session]
PROVIDER = file

[log]
MODE      = console
LEVEL     = info
ROUTER    = console