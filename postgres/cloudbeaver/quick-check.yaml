apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: cnpg-system
  labels:
    app: cloudbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:latest
          ports:
            - containerPort: 8978
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: cloudbeaver-data
              mountPath: /opt/cloudbeaver/workspace
      volumes:
        - name: cloudbeaver-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver-service
  namespace: cnpg-system
spec:
  type: NodePort
  selector:
    app: cloudbeaver
  ports:
    - protocol: TCP
      port: 8978
      targetPort: 8978
      # You can optionally specify a nodePort between 30000-32767
      nodePort: 30978
