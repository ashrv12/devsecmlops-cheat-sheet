apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgweb
  labels:
    app: pgweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgweb
  template:
    metadata:
      labels:
        app: pgweb
    spec:
      containers:
        - name: pgweb
          image: sosedoff/pgweb:latest
          ports:
            - containerPort: 8081
          env:
            # Replace these with your actual ClusterIP service name and credentials
            - name: DATABASE_URL
              value: "postgres://app:Dz1kk0Eq1HrsEg0XuEOKf9JyHcdeV1bQFHrlsTBitGpGiSbYG2PCC77SRApOJ1Tv@pgbouncer-pooler:5432/app?sslmode=disable"
          livenessProbe:
            httpGet:
              path: /
              port: 8081
          readinessProbe:
            httpGet:
              path: /
              port: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: pgweb-svc
spec:
  selector:
    app: pgweb
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
  type: ClusterIP
