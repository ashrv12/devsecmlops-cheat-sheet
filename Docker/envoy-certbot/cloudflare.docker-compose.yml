services:
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    environment:
      - TZ=Asia/Hongkong
    networks:
      - netbird_net
    ports:
      - "443:443"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
      - ./certbot/conf:/etc/envoy/certs:ro
    restart: always

networks:
  netbird_net:
    external: true
