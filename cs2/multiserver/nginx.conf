stream {
    upstream scrim_server { server 127.0.0.1:27015; }
    upstream comp_server { server 127.0.0.1:27016; }

    server {
        listen 27015 udp; # Client connects here
        proxy_pass scrim_server;
    }
    server {
        listen 27016 udp;
        proxy_pass comp_server;
    }
}

; The "Clean" Solution for your Users
; Since you are a DevOps engineer, the most professional way to handle this for your users is:

; Use a Simple Subdomain: cs2.example.com.

; Use a Landing Page: Point that domain to a small, fast website (using NGINX/Caddy) that lists the servers:

; Scrim: steam://connect/cs2.example.com:27015

; DM: steam://connect/cs2.example.com:27016

; Steam Links: Create simple HTML buttons on that page with the steam:// protocol URI. When a user clicks, it opens CS2 and connects them automatically to the right port.

; This provides the "domain experience" your users want without fighting the fundamental limitations of the UDP protocol.