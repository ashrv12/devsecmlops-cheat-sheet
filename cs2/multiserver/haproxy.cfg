global
    log /dev/log local0
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    tcp          # Critical: We are operating at Layer 4
    option  tcplog
    timeout connect 5s
    timeout client  1m
    timeout server  1m

# --- SCRIM SERVER (Port 27015) ---
frontend cs2_scrim_in
    bind *:270150 udp    # Game Traffic
    bind *:27015 tcp     # RCON Traffic
    default_backend cs2_scrim_back

backend cs2_scrim_back
    server scrim_1 127.0.0.1:27015 check

# --- WARMUP DM (Port 27016) ---
frontend cs2_dm_in
    bind *:27016 udp
    bind *:27016 tcp
    default_backend cs2_dm_back

backend cs2_dm_back
    server dm_1 127.0.0.1:27016 check

# --- 1v1 SERVER (Port 27017) ---
frontend cs2_1v1_in
    bind *:27017 udp
    bind *:27017 tcp
    default_backend cs2_1v1_back

backend cs2_1v1_back
    server one_v_one_1 127.0.0.1:27017 check


; The DevSecOps Workaround: SRV RecordsSince you want those specific subdomains to work without the user typing a port, you must pair the HAProxy setup with DNS SRV Records. 

; This is the only way to "map" a subdomain to a specific port for game clients.
