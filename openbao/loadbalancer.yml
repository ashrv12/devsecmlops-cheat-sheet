apiVersion: v1
kind: Service
metadata:
  name: openbao-lb
  namespace: openbao
  annotations:
    metallb.universe.tf/address-pool: pre
    metallb.universe.tf/loadBalancerIPs: 10.90.0.72
spec:
  ports:
    - appProtocol: HTTP
      name: http
      port: 8200
      protocol: TCP
      targetPort: 8200
    - name: https-internal
      port: 8201
      protocol: TCP
      targetPort: 8201
  selector:
    app.kubernetes.io/instance: openbao
    app.kubernetes.io/name: openbao
    component: server
  sessionAffinity: None
  type: LoadBalancer
status:
  loadBalancer: {}
